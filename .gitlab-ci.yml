stages:
  - verification
  - installation
  - test

variables:
  CI: "true"

check_environment:
  stage: verification
  image: mcr.microsoft.com/playwright:v1.49.0-noble
  script:
    - node -v
    - npm -v
    - npx playwright --version

install_dependencies:
  stage: installation
  image: mcr.microsoft.com/playwright:v1.49.0-noble
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

playwright_tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.49.0-noble
  dependencies:
    - install_dependencies
  script:
    - npx playwright test e2e/Scenario3.spec.ts
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days